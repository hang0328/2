      '<div class="scene-tag" style="background:' + s.tagBg + ';color:' + s.tagColor + ';">' + s.tag + '</div>' +
      '<h2 class="scene-name">' + s.name + '</h2>' +
      '<p class="scene-sub">' + s.sub + '</p>' +
    '</div>';
  container.appendChild(slide);

  // Dot
  var dot = document.createElement('button');
  dot.className = 'tour-dot' + (i === 0 ? ' active' : '');
  dot.innerHTML = '<span class="tour-dot-label">' + s.name + '</span>';
  dot.onclick = function(){ goTo(i); };
  dotsEl.appendChild(dot);
});

document.getElementById('stepTotal').textContent = scenes.length;
document.getElementById('progressBar').style.width = (100/scenes.length) + '%';

// Navigate
function goTo(index) {
  if (transitioning || index === current) return;
  if (index < 0) index = scenes.length - 1;
  if (index >= scenes.length) index = 0;
  transitioning = true;

  // Deactivate current
  var slides = document.querySelectorAll('.tour-slide');
  slides[current].classList.remove('active');
  document.querySelectorAll('.tour-dot')[current].classList.remove('active');

  current = index;

  // Activate new
  slides[current].classList.add('active');
  document.querySelectorAll('.tour-dot')[current].classList.add('active');
  document.getElementById('stepNum').textContent = current + 1;
  document.getElementById('progressBar').style.width = ((current+1)/scenes.length*100) + '%';

  // Update info
  updateInfo(scenes[current]);

  setTimeout(function(){ transitioning = false; }, 1200);
}

function go(dir) { goTo(current + dir); }

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  else if (e.key === 'Escape' && infoOpen) toggleInfo();
  else if (e.key === 'i' || e.key === 'I') toggleInfo();
});

// Touch swipe
var touchStartX = 0;
document.getElementById('tour').addEventListener('touchstart', function(e) {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.getElementById('tour').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) go(dx > 0 ? -1 : 1);
}, { passive: true });

// Info panel
function toggleInfo() {
  infoOpen = !infoOpen;
  document.getElementById('infoPanel').classList.toggle('open', infoOpen);
  document.getElementById('infoToggle').style.opacity = infoOpen ? '0' : '1';
  document.getElementById('infoToggle').style.pointerEvents = infoOpen ? 'none' : 'all';
}
function updateInfo(s) {
  var specsH = '';
  s.specs.forEach(function(sp) {
    specsH += '<div class="info-spec"><div class="info-spec-label">' + sp.l + '</div><div class="info-spec-value">' + sp.v + '</div></div>';
  });
  var featH = '';
  s.features.forEach(function(f) {
    featH += '<li>' + f + '</li>';
  });
  document.getElementById('infoContent').innerHTML =
    '<h3>' + s.name + '</h3>' +
    '<p class="info-desc">' + s.desc + '</p>' +
    '<div class="info-specs">' + specsH + '</div>' +
    '<ul class="info-features">' + featH + '</ul>' +
    '<div class="info-path">&#10148; ' + s.path + '</div>';
}

// Init
updateInfo(scenes[0]);

// Loading: hide when first image loads
var firstImg = document.querySelector('.tour-slide:first-child img');
if (firstImg.complete) {
  document.getElementById('loading').classList.add('hidden');
} else {
  firstImg.onload = function() {
    document.getElementById('loading').classList.add('hidden');
  };
}
</script>
</body>
</html>
